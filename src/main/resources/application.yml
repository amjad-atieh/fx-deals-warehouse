spring:
  application:
    name: fxdeals
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fxdeals}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.PostgreSQLDialect
